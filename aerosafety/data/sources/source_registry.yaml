  # ── 4. Iowa State Mesonet — METAR Archive (primary METAR source) ────────────
  - source_id: "IEM_METAR"
    name: "Iowa Environmental Mesonet (IEM) — ASOS/METAR Archive"
    organization: "Iowa State University / NOAA mirror"
    official_url: "https://mesonet.agron.iastate.edu/request/download.phtml"
    license: >
      Public domain. Data originates from NOAA/NWS public feeds.
      IEM Terms of Service: https://mesonet.agron.iastate.edu/info/tos.phtml
      No registration required. Globally accessible.
    commercial_use_ok: true
    access_method: "api"
    requires_user_action: false
    residency_restriction: "none"
    critical_path: true
    alternative_source_id: null
    user_action_description: null
    expected_format:
      - "csv"
    estimated_volume: >
      Hundreds of millions of global METAR observations.
      Filter by station ICAO code and date range.
    task_families: [3]
    citation: >
      Iowa Environmental Mesonet (IEM), Iowa State University.
      ASOS-METAR Archive.
      Available at: https://mesonet.agron.iastate.edu/request/download.phtml
      Underlying data: NOAA/NWS.
    last_verified: "2026-05-17"
    notes: >
      Rate limit: no more than 300 requests/hour per IP (see TOS).
      Use 12-second inter-request delay. No API key, no registration.
      Replaces NOAA_AWC_API (aviationweather.gov) from prior registry version —
      IEM provides the same underlying NOAA/NWS data without residency gating
      and with a deeper historical archive.
      Endpoint: https://mesonet.agron.iastate.edu/cgi-bin/request/asos.py
      Use report_type=3 for METAR observations.
      See IEM_TAF (entry below) for Terminal Aerodrome Forecasts.
      Select priority high-traffic airports (KLAX, KJFK, KORD, KATL, EGLL, RJTT, etc.).
    enabled: true

