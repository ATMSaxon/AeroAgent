# AeroSafetyEval — Authoritative Data Source Registry
#
# Governed by CLAUDE.md §2.1 (Authoritative Sources Only).
# Every source must include: official URL, license, access method,
# expected format, citation, last-verified date, and requires_user_action flag.
#
# Fields:
#   source_id: str
#   name: str
#   organization: str
#   official_url: str
#   license: str
#   commercial_use_ok: bool | "unknown"  — whether license permits commercial research use
#   access_method: "direct_download" | "api" | "manual_request" | "web_scrape_permitted"
#   requires_user_action: bool           — True if user must register, request key, or sign agreement
#   user_action_description: str | null  — what action is required
#   expected_format: list[str]           — file formats to expect
#   estimated_volume: str                — rough order-of-magnitude estimate
#   task_families: list[int]             — which task families (1–9) this source feeds
#   citation: str                        — standard citation text
#   last_verified: str                   — YYYY-MM-DD, date URL/license was last checked
#   notes: str                           — any special constraints or caveats
#   enabled: bool                        — set to false until team-lead green-lights download

schema_version: "1.0.0"
created: "2026-05-17"
author: "data-curator"
governed_by: "CLAUDE.md §2.1, proposal §9.2"

sources:

  # ── 1. NASA ASRS ──────────────────────────────────────────────────────────
  - source_id: "NASA_ASRS"
    name: "Aviation Safety Reporting System (ASRS) Database"
    organization: "NASA Ames Research Center / FAA"
    official_url: "https://asrs.arc.nasa.gov/search/database.html"
    license: >
      Public domain (U.S. Government work, 17 U.S.C. §105).
      De-identified voluntarily submitted safety reports.
    commercial_use_ok: true
    access_method: "direct_download"
    requires_user_action: false
    user_action_description: null
    expected_format:
      - "txt"
      - "csv"
    estimated_volume: "~1.5 million reports total; ~60,000–80,000 added per year"
    task_families: [1, 2]
    citation: >
      NASA Aviation Safety Reporting System (ASRS).
      National Aeronautics and Space Administration, Ames Research Center.
      Available at: https://asrs.arc.nasa.gov
    last_verified: "2026-05-17"
    notes: >
      Reports are de-identified; no personally identifiable information.
      Download via the ASRS database search (bulk download available in CSV).
      Narratives may contain reporter-supplied information not independently verified.
      Mark all ASRS-derived records with source_type=ASRS_VOLUNTARY_REPORT.
    enabled: false

