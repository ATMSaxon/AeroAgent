# AeroSafetyEval — Authoritative Data Source Registry
#
# Governed by CLAUDE.md §2.1 (Authoritative Sources Only).
# v1.1.0 (2026-05-17): added residency_restriction field per PI constraint.
# v1.2.0 (2026-05-17): split IEM_METAR/IEM_TAF; added OGIMET_TAF; added
#   substitute_source field to FAA_NOTAM_API; renumbered all entries.
# All sources on the critical path must have residency_restriction: none.
#
# Fields:
#   source_id: str
#   name: str
#   organization: str
#   official_url: str
#   license: str
#   commercial_use_ok: bool | "unknown"
#   access_method: "direct_download" | "api" | "manual_request" | "web_scrape_permitted"
#   requires_user_action: bool           — True if registration/key/agreement required
#   residency_restriction: str           — none | us_resident | eu_member | commercial_license
#     "none"               = publicly accessible globally, no residency gate
#     "us_resident"        = US-based API keys, US-only access restrictions, or
#                            ToS implying US-resident status required
#     "eu_member"          = requires EU/ECAC membership or institutional access
#     "commercial_license" = requires paid license regardless of residency
#   critical_path: bool                  — true if on the pilot-task critical path
#   alternative_source_id: str | null    — if not critical_path, which source replaces it
#   substitute_source: str | null        — for off-critical-path sources, describes what
#                                          we actually use in Phase 1 instead
#   user_action_description: str | null
#   expected_format: list[str]
#   estimated_volume: str
#   task_families: list[int]
#   citation: str
#   last_verified: str                   — YYYY-MM-DD
#   notes: str
#   enabled: bool                        — false until team-lead green-lights download

schema_version: "1.2.0"
created: "2026-05-17"
updated: "2026-05-17"
author: "data-curator"
governed_by: "CLAUDE.md §2.1, proposal §9.2"

