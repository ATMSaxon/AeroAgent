  # ── 9. OpenSky Network — ADS-B Trajectories ───────────────────────────────
  - source_id: "OPENSKY_ADSB"
    name: "OpenSky Network — Historical ADS-B Data"
    organization: "OpenSky Network (open-source research consortium)"
    official_url: "https://opensky-network.org/data/impala"
    license: >
      OpenSky Network Data License Agreement.
      Academic / research use permitted without charge.
      Commercial use requires separate agreement.
      Full terms: https://opensky-network.org/about/terms-of-use
    commercial_use_ok: false
    access_method: "api"
    requires_user_action: true
    user_action_description: >
      Requires free registration at https://opensky-network.org/register.
      Impala cluster access for historical data requires additional request via
      https://opensky-network.org/data/impala (academic credential may be required).
    expected_format:
      - "parquet"
      - "csv"
    estimated_volume: "Billions of ADS-B state vectors; filter by airport/ICAO + date range"
    task_families: [6]
    citation: >
      Matthias Schäfer, Martin Strohmeier, Vincent Lenders, Ivan Martinovic, Matthias Wilhelm.
      Bringing Up OpenSky: A Large-scale ADS-B Sensor Network for Research.
      IPSN-14, April 2014.
      Available at: https://opensky-network.org
    last_verified: "2026-05-17"
    notes: >
      Use traffic library (https://traffic-viz.github.io/) for trajectory processing.
      Restrict to terminal area trajectories (within ~50 NM of selected airports).
      ADS-B data quality varies; flag records with low message rate or position anomalies.
      ADSB-derived positions are not certified navigation data.
    enabled: false

