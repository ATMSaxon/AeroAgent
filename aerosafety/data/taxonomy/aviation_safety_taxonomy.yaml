          - "FAA 14 CFR Part 121.628 — MEL authority"
          - "MMEL (Master Minimum Equipment List) structure"
          - "MEL categories: A (no limit), B (3 days), C (10 days), D (120 days)"
          - "Dispatch conditions (O-item, M-item)"
        knowledge_point_seeds:
          - "MEL category determination from discrepancy"
          - "Dispatch allowed/not-allowed decision"
          - "O-item and M-item requirement identification"
          - "Repair interval compliance check"
        critical_failure_modes:
          - "Recommending dispatch when MEL prohibits"
          - "Ignoring category interval expiry"
          - "Missing required O-item or M-item condition"

      - subtopic_id: "8.2"
