          - "Route restriction from MEL item"
          - "ETOPS eligibility with inoperative system"
        critical_failure_modes:
          - "Missing operational restriction from MEL item"
          - "Approving ETOPS when not eligible"

      - subtopic_id: "8.3"
        name: "Repeat Defect and Reliability Risk"
        key_rules_and_concepts:
          - "FAA AC 120-16G — continuous airworthiness maintenance programs"
          - "Reliability program repeat fault triggers"
          - "SDR (Service Difficulty Report) repeat patterns"
        knowledge_point_seeds:
          - "Repeat defect pattern identification"
          - "Systemic failure risk recognition"
        critical_failure_modes:
          - "Treating isolated fault as isolated when pattern exists"
          - "Missing repeat write-up history"

  - branch_id: 9
    name: "Optimization-Integrated Operations"
    description: >
      Covers runway sequencing, gate assignment, arrival/departure balancing,
      ground delay programs, and corridor allocation under safety constraints.
    task_family: "Task Family 9 — Optimization-Integrated Aviation Decisions"
    subtopics:

      - subtopic_id: "9.1"
